name: Build Windows EXE v1.0.0 (LoanTracker)

on:
  push:
    branches: [ main ]
  pull_request:

env:
  APP_NAME: LoanTracker
  APP_VERSION: 1.0.0
  DB_NAME: loantracker_db

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run unit tests
        run: mvn -B test

      - name: Build with Maven (package)
        run: mvn -B -DskipTests package

      - name: Prepare installer input and copy artifacts
        shell: powershell
        run: |
          $jar = Get-ChildItem -Path target -Filter '*.jar' | Where-Object { $_.Name -notmatch 'original' } | Select-Object -ExpandProperty Name -First 1
          if (-not $jar) { Write-Error "No jar found in target/"; Exit 1 }
          echo "JAR_NAME=$jar" >> $env:GITHUB_ENV

          New-Item -ItemType Directory -Force -Path installer-input
          Copy-Item "target\$jar" -Destination installer-input -Force

          if (Test-Path src\main\resources\icon.ico) { Copy-Item src\main\resources\icon.ico installer-input\icon.ico -Force }

          # Copy DB schema if present in repo/db/schema.sql, otherwise create a minimal schema file
          New-Item -ItemType Directory -Force -Path installer-input\db
          if (Test-Path db\schema.sql) {
            Copy-Item db\schema.sql installer-input\db\schema.sql -Force
          } else {
            @"
  -- Minimal PostgreSQL schema for LoanTracker
-- Database name: $env:DB_NAME
-- Run: CREATE DATABASE $env:DB_NAME WITH ENCODING='UTF8';
  CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
  CREATE TABLE IF NOT EXISTS users ( id UUID PRIMARY KEY DEFAULT uuid_generate_v4(), username VARCHAR(100) NOT NULL UNIQUE, password_hash VARCHAR(255) NOT NULL, full_name VARCHAR(200), email VARCHAR(200), role VARCHAR(50) DEFAULT 'user', created_at TIMESTAMP WITH TIME ZONE DEFAULT now() );
  CREATE TABLE IF NOT EXISTS categories ( id SERIAL PRIMARY KEY, name VARCHAR(100) NOT NULL, type VARCHAR(20) NOT NULL CHECK (type IN ('expense','income')), description TEXT );
  CREATE TABLE IF NOT EXISTS loans ( id UUID PRIMARY KEY DEFAULT uuid_generate_v4(), user_id UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE, lender VARCHAR(200), principal NUMERIC(14,2) NOT NULL CHECK (principal >= 0), interest_rate NUMERIC(5,4) DEFAULT 0.0, term_months INTEGER, start_date DATE, status VARCHAR(30) DEFAULT 'active', created_at TIMESTAMP WITH TIME ZONE DEFAULT now() );
  CREATE TABLE IF NOT EXISTS loan_payments ( id UUID PRIMARY KEY DEFAULT uuid_generate_v4(), loan_id UUID NOT NULL REFERENCES loans(id) ON DELETE CASCADE, payment_date DATE NOT NULL, amount NUMERIC(14,2) NOT NULL, principal_portion NUMERIC(14,2) DEFAULT 0, interest_portion NUMERIC(14,2) DEFAULT 0, remaining_balance NUMERIC(14,2), notes TEXT, created_at TIMESTAMP WITH TIME ZONE DEFAULT now() );
  CREATE TABLE IF NOT EXISTS expenses ( id UUID PRIMARY KEY DEFAULT uuid_generate_v4(), user_id UUID REFERENCES users(id) ON DELETE SET NULL, category_id INTEGER REFERENCES categories(id) ON DELETE SET NULL, amount NUMERIC(14,2) NOT NULL, expense_date DATE NOT NULL, description TEXT, recurring BOOLEAN DEFAULT FALSE, created_at TIMESTAMP WITH TIME ZONE DEFAULT now() );
  "@ | Out-File -FilePath installer-input\db\schema.sql -Encoding utf8
          }

      - name: Add technology stack metadata into installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer-input\docs
          @"
Application: $env:APP_NAME (Java desktop - Loan & Expense Tracking)
Version: $env:APP_VERSION

Database:
  - Engine: PostgreSQL
  - Database name: $env:DB_NAME

Backend:
  - Java / Jakarta EE (Java 17)
  - Build: Maven
  - Persistence: JPA (Hibernate) with PostgreSQL
  - Migrations: Flyway recommended

Front-end:
  - JavaFX (FXML) recommended for desktop UI
  - Alternative: Swing

Packaging:
  - Packaged with jpackage into Windows exe
  "@ | Out-File -FilePath installer-input\docs\TECHNOLOGIES.txt -Encoding utf8

      - name: Add runtime setup scripts (run.bat and setup.ps1) and config template
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer-input\scripts
          # Windows batch that prompts for DB details, writes config, then runs the jar.
          $bat = @"
  @echo off
  REM Run setup for $env:APP_NAME
  setlocal enabledelayedexpansion
  
  echo.
  echo Welcome to $env:APP_NAME setup (first run).
set /p DB_HOST=Enter PostgreSQL host (default: localhost):
  if "%DB_HOST%"=="" set DB_HOST=localhost
set /p DB_PORT=Enter PostgreSQL port (default: 5432):
  if "%DB_PORT%"=="" set DB_PORT=5432
set /p DB_NAME=Enter database name (default: $env:DB_NAME):
  if "%DB_NAME%"=="" set DB_NAME=$env:DB_NAME
set /p DB_USER=Enter database username:
set /p DB_PASS=Enter database password:

  REM Write properties file
  set CONFIG_DIR=%~dp0\..\config
  if not exist "%CONFIG_DIR%" mkdir "%CONFIG_DIR%"
  (
  echo jdbc.url=jdbc:postgresql://%DB_HOST%:%DB_PORT%/%DB_NAME%
  echo jdbc.user=%DB_USER%
  echo jdbc.password=%DB_PASS%
  ) > "%CONFIG_DIR%\app.properties"
  
  echo Configuration saved to %CONFIG_DIR%\app.properties
  echo Starting application...
  
  REM Run the packaged jar (jar copied to parent folder)
  cd /d "%~dp0\.."
  java -jar "%~dp0\..\$env:JAR_NAME%"
  exit /b %errorlevel%
  "@
          $bat | Out-File -FilePath installer-input\scripts\run.bat -Encoding ascii

          # PowerShell alternative setup with masked password input (for advanced users)
          $ps = @"
  Write-Host 'Running $env:APP_NAME setup (PowerShell)'
  \$host.UI.RawUI.WindowTitle = '$env:APP_NAME Setup'
\$dbHost = Read-Host 'PostgreSQL host (default: localhost)'; if ([string]::IsNullOrEmpty(\$dbHost)) { \$dbHost = 'localhost' }
\$dbPort = Read-Host 'PostgreSQL port (default: 5432)'; if ([string]::IsNullOrEmpty(\$dbPort)) { \$dbPort = '5432' }
\$dbName = Read-Host 'Database name (default: $env:DB_NAME)'; if ([string]::IsNullOrEmpty(\$dbName)) { \$dbName = '$env:DB_NAME' }
  \$dbUser = Read-Host 'Database username'
  Write-Host 'Enter database password:'
  \$secure = Read-Host -AsSecureString
  \$bstr = [System.Runtime.InteropServices.Marshal]::SecureStringToBSTR(\$secure)
  \$dbPass = [System.Runtime.InteropServices.Marshal]::PtrToStringAuto(\$bstr)
  
  \$configDir = Join-Path -Path (Split-Path -Parent \$MyInvocation.MyCommand.Definition) '..\config'
  if (-not (Test-Path \$configDir)) { New-Item -ItemType Directory -Path \$configDir | Out-Null }
  
  @{
     'jdbc.url' = \"jdbc:postgresql://\$dbHost:\$dbPort/\$dbName\"
     'jdbc.user' = \$dbUser
     'jdbc.password' = \$dbPass
} | ForEach-Object { \"\$($_.Key)=\$($_.Value)\" } | Out-File -FilePath (Join-Path \$configDir 'app.properties') -Encoding utf8
  
  Write-Host 'Configuration saved. Starting application...'
  Start-Process -FilePath 'java' -ArgumentList ('-jar','..\\$env:JAR_NAME') -NoNewWindow
  "@
          $ps | Out-File -FilePath installer-input\scripts\setup.ps1 -Encoding utf8

          # Template properties for documentation
          @"
# JDBC configuration template for $env:APP_NAME
  jdbc.url=jdbc:postgresql://localhost:5432/$env:DB_NAME
  jdbc.user=your_db_user
  jdbc.password=your_db_password
  "@ | Out-File -FilePath installer-input\config_template.properties -Encoding utf8

      - name: Generate sample reports from built JAR (sample from/to dates)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer-input\sample-reports
          java -jar "target\$env:JAR_NAME" --generate-report --from "2026-01-01" --to "2026-06-30" --format csv --output installer-input\sample-reports\loan-expense-report.csv || Write-Host "Report generation skipped or failed — ensure your app supports these flags"

- name: Run verification / static checks
  run: mvn -B verify

- name: Create Windows EXE with jpackage (bundles resources and scripts)
  shell: powershell
  run: |
    jpackage --input installer-input `
             --name $env:APP_NAME `
             --main-jar $env:JAR_NAME `
             --main-class com.example.Main `
             --type exe `
             --app-version $env:APP_VERSION `
             --win-shortcut `
             --win-menu `
             --resource-dir installer-input `
             --icon installer-input\icon.ico `
             --dest output

- name: Add helper batch to output (copy run.bat next to exe)
  shell: powershell
  run: |
    New-Item -ItemType Directory -Force -Path output\extras
    Copy-Item installer-input\scripts\run.bat output\extras\run.bat -Force
    Copy-Item installer-input\scripts\setup.ps1 output\extras\setup.ps1 -Force
    Copy-Item installer-input\config_template.properties output\extras\config_template.properties -Force

- name: Collect test and site reports
  shell: powershell
  run: |
    New-Item -ItemType Directory -Force -Path output\ci-reports
    if (Test-Path target\surefire-reports) { Copy-Item -Recurse target\surefire-reports output\ci-reports }
    if (Test-Path target\site) { Copy-Item -Recurse target\site output\ci-reports }

- name: Upload EXE artifact
  uses: actions/upload-artifact@v4
  with:
    name: loan-tracker-windows-exe
    path: output/*.exe

- name: Upload extras artifact (run scripts, schema, sample reports)
  uses: actions/upload-artifact@v4
  with:
    name: loan-tracker-extras-v${{ env.APP_VERSION }}
    path: |
      installer-input\db\schema.sql
      installer-input\scripts\run.bat
      installer-input\scripts\setup.ps1
      installer-input\config_template.properties
      installer-input\sample-reports/**

- name: Upload CI reports (tests, site, static checks)
  uses: actions/upload-artifact@v4
  with:
    name: loan-tracker-ci-reports
    path: output/ci-reports/**
